# DEPLOY/nginx.conf
# Proxy reverso para Evolution API (porta 8080) e back-end do bot (porta 8000).
# Substitua seudominio.com pelo domínio real antes de usar.
# Após o DNS apontar para o IP da VM, rode:
#   sudo certbot --nginx -d seudominio.com

server {
    listen 80;
    server_name seudominio.com;

    # Redireciona HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name seudominio.com;

    # O Certbot preenche ssl_certificate e ssl_certificate_key automaticamente.

    client_max_body_size 20M;

    # Evolution API — acessível em /evolution/
    location /evolution/ {
        proxy_pass http://localhost:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Back-end do bot (FastAPI) — webhook e API REST
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
